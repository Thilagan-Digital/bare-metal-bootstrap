[defaults]
# Point at your own (git-ignored) private inventory when you run the
# pipeline, e.g.:
#   ansible-playbook -i private-inventory/hosts.ini site.yml --ask-vault-pass
# This default just makes the example inventory work out of the box.
inventory = inventory.example/hosts.ini
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent

[ssh_connection]
# Nodes are typically reached over Tailscale SSH (or the LAN). ControlPersist
# keeps the multi-node run fast.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
