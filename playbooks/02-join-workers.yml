---
- name: Join Worker Nodes to Cluster
  hosts: worker_nodes
  become: true
  vars:
    control_ip: "{{ hostvars[groups['control_node'][0]]['ansible_default_ipv4']['address'] }}"
  tasks:
    - name: Check cluster membership
      command: pvecm status
      register: member_status
      failed_when: false
      changed_when: false

    - name: Join cluster via SSH authentication
      # `ansible.builtin.expect` runs on the MANAGED node, so `pexpect` must be
      # installed on each worker (not the control machine): apt install
      # python3-pexpect / pip install pexpect. It drives pvecm's interactive
      # password + host-key prompts. `--use_ssh` also needs this worker's root
      # able to SSH to the control node (key or password).
      expect:
        command: "pvecm add {{ control_ip }} --link0 {{ ansible_default_ipv4.address }} --use_ssh"
        responses:
          (?i)password: "{{ pve_root_password }}"
          (?i)are you sure you want to continue connecting: "yes"
      when: member_status.rc != 0
