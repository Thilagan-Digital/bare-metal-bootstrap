---
# Example group_vars — COPY THIS into your private inventory and adapt.
# All values are placeholders; nothing here is environment-specific.

cluster_name: "pve-cluster"

# LAN subnet trusted for emergency SSH access if Tailscale is ever down, and
# the only source playbooks/06-pve-firewall.yml's corosync assertion accepts
# for ring0 addressing. Proxmox's own web UI/API (8006) is intentionally
# NOT in this list once 06 runs — it's locked to the tailnet interface only.
trusted_lan_subnet: "10.10.10.0/24"

# Your tailnet's MagicDNS suffix (admin console -> DNS -> "tailnet name"),
# used by playbooks/05-tls-cert.yml to build each node's own
# <inventory_hostname>.<tailnet_domain> cert name. Requires Tailscale HTTPS
# Certificates enabled tailnet-wide first.
tailnet_domain: "example.ts.net"

# Passwords are referenced from an encrypted Ansible Vault file, never stored
# in plaintext. Create one alongside this file with:
#   ansible-vault create private-inventory/group_vars/vault.yml
# and define vault_pve_root_password / vault_qdevice_root_password there.
pve_root_password: "{{ vault_pve_root_password }}"
qdevice_root_password: "{{ vault_qdevice_root_password }}"

# Cluster-wide shared storage tiers, added on the control node and propagated
# to every member via pmxcfs. Point `server` at your NFS/SMB host.
pve_storage_pools:
  # Fast NFS share for active VM disks & LXC rootfs
  - name: "nas-vms"
    server: "10.10.10.30"
    export: "/export/proxmox/vms"
    content: "images,rootdir"
    options: "vers=4.1,hard,timeo=600,retrans=2"

  # High-capacity NFS share for ISOs, templates, and backups
  - name: "nas-backups"
    server: "10.10.10.30"
    export: "/export/proxmox/backups"
    content: "backup,iso,vztmpl"
    options: "vers=4.1,hard,timeo=600"

# Expected PVE major version — playbooks/07-pve-patch.yml refuses to patch
# or enable unattended-upgrades unless the running pve-manager matches this.
# Bump when you intentionally upgrade the cluster to a new major release.
pve_expected_major_version: "8"

# Guest migration strategy for 07-pve-patch.yml's drain-before-reboot step:
#   "live"     — live-migrate QEMU guests + relocate LXC (requires shared storage)
#   "ha"       — HA-manager drain, then migrate non-HA guests
#   "shutdown" — ACPI-stop all guests, patch, reboot, start them back
pve_migration_mode: "live"

