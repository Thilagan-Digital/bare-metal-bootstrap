; Example inventory — COPY THIS, don't edit it in place.
;
; The pipeline expects three groups: control_node (runs `pvecm create`),
; worker_nodes (run `pvecm add`), and qdevice (the external quorum voter,
; e.g. a NAS running corosync-qnetd).
;
; Create your own private copy that the .gitignore already excludes, e.g.:
;   mkdir -p private-inventory/group_vars
;   cp inventory.example/hosts.ini            private-inventory/hosts.ini
;   cp inventory.example/group_vars/all.yml   private-inventory/group_vars/all.yml
; then run:
;   ansible-playbook -i private-inventory/hosts.ini site.yml --ask-vault-pass
;
; All addresses below are placeholders. Use LAN IPs, or each node's Tailscale
; 100.x.y.z address if you drive the run over the overlay network.

[control_node]
pve-01 ansible_host=10.10.10.11 ansible_user=root

[worker_nodes]
pve-02 ansible_host=10.10.10.12 ansible_user=root
pve-03 ansible_host=10.10.10.13 ansible_user=root

[qdevice]
qdevice-01 ansible_host=10.10.10.20 ansible_user=root

[pve_cluster:children]
control_node
worker_nodes
