name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: "."

      - name: Bash syntax check
        run: |
          set -euo pipefail
          for f in *.sh; do
            echo "Checking $f"
            bash -n "$f"
          done

  ansible-lint:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: pip install ansible-core

      - name: Playbook syntax check
        run: ansible-playbook --syntax-check -i inventory.example/hosts.ini site.yml
